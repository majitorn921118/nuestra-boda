<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>María José & Stalin</title>

<style>

body {
    margin: 0;
    background: #faf6f1;
    font-family: "Georgia", serif;
    color: #5b1a2a;
    text-align: center;
}

.carta {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 25px;
}

.contenedor {
    background: #fffdf9;
    max-width: 500px;
    padding: 45px 30px;
    border: 3px solid #8b3045;
    border-radius: 5px;
    box-shadow: 0 10px 30px rgba(91,26,42,0.2);
    position: relative;
}

.contenedor:before {
    content: "🌹";
    position: absolute;
    top: 10px;
    left: 15px;
    font-size: 35px;
}

.contenedor:after {
    content: "🌹";
    position: absolute;
    bottom: 10px;
    right: 15px;
    font-size: 35px;
}

.dorado {
    color: #c9a24d;
    font-size: 28px;
}

h1 {
    font-size: 42px;
    color: #8b3045;
    margin: 20px 0;
}

h2 {
    font-weight: normal;
}

.texto {
    line-height: 1.8;
    font-size: 17px;
}

.frase {
    margin-top: 25px;
    font-style: italic;
    color: #7b5960;
}

</style>

</head>

<body>

<div class="carta">

<div class="contenedor">

<div class="dorado">✦</div>

<h2>
Con la bendición de Dios
</h2>

<p class="texto">
Los padres del novio
<br>
<strong>Servio Carmona</strong>
<br>
<strong>Carmen Castillo</strong>
</p>

<div class="dorado">♡</div>

<p class="texto">
Los padres de la novia
<br>
<strong>Ramón Ronquillo</strong>
<br>
<strong>Patricia Núñez</strong>
</p>

<br>

<p class="texto">
Tenemos el honor de invitarte al matrimonio de nuestros hijos
</p>

<h1>
María José
<br>
&
<br>
Stalin
</h1>

<p class="frase">
"El amor es paciente, el amor es bondadoso"
<br>
1 Corintios 13:4
</p>

<div class="dorado">✦</div>

</div>

</div>

</body>
</html>
